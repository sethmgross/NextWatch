<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Seth's Next Watch</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #13131a;
    --surface2: #1c1c27;
    --border: #2a2a3a;
    --accent: #e8c840;
    --text: #e8e8f0;
    --muted: #7070a0;
    --good: #4cde8a;
    --mid: #e8c840;
    --low: #ff6b35;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; font-weight: 300; min-height: 100vh; }

  header {
    background: rgba(10,10,15,0.97);
    backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--border);
    position: sticky; top: 0; z-index: 100;
  }

  .header-top {
    display: flex;
    align-items: center;
    gap: 24px;
    padding: 16px 48px 0;
  }

  .clown-logo { flex-shrink: 0; width: 88px; height: 108px; }

  .tagline-block { display: flex; flex-direction: column; justify-content: center; }

  .tagline-sub {
    font-size: 0.82rem;
    font-weight: 400;
    color: var(--muted);
    letter-spacing: 0.06em;
    margin-bottom: 4px;
  }

  .tagline-main {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(1.8rem, 4vw, 3.4rem);
    letter-spacing: 0.06em;
    color: var(--accent);
    line-height: 1;
    display: inline-block;
    border-bottom: 3px solid var(--accent);
    padding-bottom: 3px;
  }

  .tabs {
    display: flex;
    overflow-x: auto;
    scrollbar-width: none;
    padding: 0 48px;
    margin-top: 12px;
  }
  .tabs::-webkit-scrollbar { display: none; }

  .tab {
    padding: 10px 20px;
    font-size: 0.75rem;
    font-weight: 500;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--muted);
    cursor: pointer;
    border: none;
    background: none;
    border-bottom: 2px solid transparent;
    white-space: nowrap;
    transition: color 0.2s, border-color 0.2s;
  }
  .tab:hover { color: var(--text); }
  .tab.active { color: var(--accent); border-bottom-color: var(--accent); }

  main { padding: 36px 48px; max-width: 1400px; margin: 0 auto; }

  .status {
    display: flex; align-items: center; gap: 10px;
    margin-bottom: 28px; font-size: 0.76rem;
    color: var(--muted); letter-spacing: 0.05em;
  }
  .status-dot { width:6px; height:6px; border-radius:50%; background:var(--good); animation:pulse 2s ease-in-out infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }

  .movie-grid { display:grid; grid-template-columns:repeat(auto-fill, minmax(145px,1fr)); gap:16px; }

  .movie-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    overflow: hidden;
    cursor: pointer;
    position: relative;
    transition: transform 0.2s, border-color 0.2s, box-shadow 0.2s;
    animation: fadeUp 0.4s ease both;
  }
  .movie-card:hover { transform:translateY(-4px); border-color:var(--accent); box-shadow:0 12px 40px rgba(0,0,0,0.5); }
  @keyframes fadeUp { from{opacity:0;transform:translateY(16px)} to{opacity:1;transform:translateY(0)} }

  .rank-badge {
    position:absolute; top:10px; left:10px;
    background:rgba(10,10,15,0.85); border:1px solid var(--border);
    color:var(--muted); font-family:'Bebas Neue',sans-serif;
    font-size:0.9rem; letter-spacing:0.06em;
    padding:2px 8px; border-radius:3px; z-index:2;
  }

  .poster-wrap { width:100%; aspect-ratio:2/3; background:var(--surface2); overflow:hidden; }
  .poster-wrap img { width:100%; height:100%; object-fit:cover; display:block; transition:transform 0.3s; }
  .movie-card:hover .poster-wrap img { transform:scale(1.04); }

  .no-poster { width:100%; height:100%; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:8px; color:var(--muted); font-size:0.7rem; letter-spacing:0.08em; text-transform:uppercase; }

  .score-bar-wrap { height:3px; background:var(--surface2); }
  .score-bar { height:3px; transition:width 0.6s ease; }

  .card-body { padding:14px 16px 16px; }
  .card-title { font-size:0.88rem; font-weight:500; line-height:1.3; margin-bottom:6px; display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden; }
  .card-meta { display:flex; align-items:center; justify-content:space-between; margin-bottom:8px; }
  .release-date { font-size:0.72rem; color:var(--muted); }
  .score { font-family:'Bebas Neue',sans-serif; font-size:1.2rem; letter-spacing:0.04em; line-height:1; }
  .score.high { color:var(--good); }
  .score.mid  { color:var(--mid); }
  .score.low  { color:var(--low); }
  .score.none { color:var(--muted); font-size:0.8rem; }
  .score-label { font-size:0.6rem; color:var(--muted); text-transform:uppercase; letter-spacing:0.1em; text-align:right; }
  .score-wrap { text-align:right; }
  .genre-tags { display:flex; flex-wrap:wrap; gap:4px; }
  .genre-tag { font-size:0.62rem; letter-spacing:0.08em; text-transform:uppercase; color:var(--muted); border:1px solid var(--border); padding:2px 7px; border-radius:2px; }

  .loading-screen { display:flex; flex-direction:column; align-items:center; justify-content:center; gap:20px; min-height:300px; color:var(--muted); font-size:0.8rem; letter-spacing:0.1em; text-transform:uppercase; }
  .film-strip { display:flex; gap:4px; }
  .film-strip span { width:8px; height:24px; background:var(--border); border-radius:1px; animation:filmLoad 1s ease-in-out infinite; }
  .film-strip span:nth-child(2){animation-delay:0.1s}
  .film-strip span:nth-child(3){animation-delay:0.2s}
  .film-strip span:nth-child(4){animation-delay:0.3s}
  .film-strip span:nth-child(5){animation-delay:0.4s}
  .film-strip span:nth-child(6){animation-delay:0.5s}
  @keyframes filmLoad { 0%,100%{background:var(--border);transform:scaleY(1)} 50%{background:var(--accent);transform:scaleY(1.5)} }

  .error-msg { color:var(--low); font-size:0.85rem; padding:20px; border:1px solid var(--low); border-radius:4px; background:rgba(255,107,53,0.05); }
  .empty-msg { color:var(--muted); font-size:0.85rem; padding:60px 20px; text-align:center; }
  .tab-panel { display:none; }
  .tab-panel.active { display:block; }

  @media (max-width:600px) {
    .header-top { padding:12px 20px 0; gap:14px; }
    .clown-logo { width:60px; height:74px; }
    .tabs { padding:0 20px; }
    main { padding:24px 20px; }
    .movie-grid { grid-template-columns:repeat(auto-fill,minmax(150px,1fr)); gap:14px; }
  }
  // Force the script to wait until every single HTML element is fully drawn
window.addEventListener('DOMContentLoaded', () => {
  init();
});
</style>
</head>

<header>
